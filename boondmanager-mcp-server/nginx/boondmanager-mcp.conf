# nginx reverse proxy pour BoondManager MCP Server
# À copier dans /etc/nginx/sites-available/boondmanager-mcp sur le VPS,
# puis activer avec :
#   ln -s /etc/nginx/sites-available/boondmanager-mcp /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Obtenir le certificat Let's Encrypt AVANT de tester :
#   certbot --nginx -d mcp.VOTRE-DOMAINE.com --non-interactive --agree-tos -m admin@votre-domaine.com
#
# Remplacer mcp.VOTRE-DOMAINE.com par votre sous-domaine réel.

limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

server {
    listen 80;
    server_name mcp.VOTRE-DOMAINE.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp.VOTRE-DOMAINE.com;

    # TLS — géré par certbot (les lignes ci-dessous sont ajoutées automatiquement)
    ssl_certificate     /etc/letsencrypt/live/mcp.VOTRE-DOMAINE.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.VOTRE-DOMAINE.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # !! CRITIQUE pour le streaming SSE (MCP utilise Server-Sent Events) !!
        # Sans ces directives, nginx bufferise la réponse entière avant de
        # l'envoyer au client → Dust reçoit le stream d'un coup et timeout.
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering "no" always;

        # En-têtes transmis à Node.js
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts généreux — les outils BoondManager (reporting, recherche large)
        # peuvent prendre jusqu'à 30s ; BOOND_HTTP_TIMEOUT_MS=30000 par défaut.
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Taille max des requêtes (payloads MCP JSON)
        client_max_body_size 10m;

        # Rate limiting : 10 req/s, burst de 20
        limit_req zone=mcp_limit burst=20 nodelay;
        limit_req_status 429;
    }

    access_log /var/log/nginx/boondmanager-mcp-access.log combined;
    error_log  /var/log/nginx/boondmanager-mcp-error.log warn;
}
