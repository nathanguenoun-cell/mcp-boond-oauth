services:
  mcp:
    image: ghcr.io/nathanguenoun-cell/mcp-boond-oauth:2.1.0
    container_name: boondmanager-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_PATH: /mcp
      MCP_HTTP_STATEFUL: "false"
      MCP_HTTP_ALLOWED_HOSTS: "*"
      NODE_ENV: production
      LOG_LEVEL: info
      LOG_FORMAT: json
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/.well-known/oauth-protected-resource').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
