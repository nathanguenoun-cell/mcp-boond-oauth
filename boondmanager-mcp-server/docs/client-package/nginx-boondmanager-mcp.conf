# nginx reverse proxy pour BoondManager MCP Server
# -------------------------------------------------------
# Installation :
#   1. Remplacez mcp.votre-domaine.com par votre sous-domaine
#   2. sudo cp nginx-boondmanager-mcp.conf /etc/nginx/sites-available/boondmanager-mcp
#   3. sudo ln -s /etc/nginx/sites-available/boondmanager-mcp /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d mcp.votre-domaine.com --non-interactive --agree-tos -m admin@votre-domaine.com

limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

server {
    listen 80;
    server_name mcp.votre-domaine.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp.votre-domaine.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.votre-domaine.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Critique pour le streaming SSE (MCP utilise Server-Sent Events)
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering "no" always;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        client_max_body_size 10m;

        limit_req zone=mcp_limit burst=20 nodelay;
        limit_req_status 429;
    }

    access_log /var/log/nginx/boondmanager-mcp-access.log combined;
    error_log  /var/log/nginx/boondmanager-mcp-error.log warn;
}
