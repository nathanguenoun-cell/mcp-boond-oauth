name: Build & Deploy to Infomaniak VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & push Docker image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/nathanguenoun-cell/mcp-boond-oauth:2.1.0
            ghcr.io/nathanguenoun-cell/mcp-boond-oauth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy → VPS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose.yml to VPS
        run: |
          scp docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/boondmanager-mcp/docker-compose.yml

      - name: Authenticate VPS to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" \
            "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'ENDSSH'
          set -euo pipefail
          cd /opt/boondmanager-mcp

          # Pull la nouvelle image (Redis est en local, pas de pull nécessaire)
          docker compose pull mcp

          # Démarrer/redémarrer les conteneurs
          docker compose up -d --remove-orphans

          # Attendre que le conteneur MCP soit healthy (max 60s)
          echo "Attente du healthcheck..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' boondmanager-mcp 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Conteneur healthy."
              break
            fi
            echo "  tentative $i/12: status=$STATUS"
            sleep 5
          done

          FINAL=$(docker inspect --format='{{.State.Health.Status}}' boondmanager-mcp 2>/dev/null || echo "unknown")
          if [ "$FINAL" != "healthy" ]; then
            echo "ERREUR : le conteneur n'est pas healthy après le déploiement."
            docker logs --tail=50 boondmanager-mcp
            exit 1
          fi

          # Nettoyage des anciennes images
          docker image prune -f
          echo "Déploiement OK."
          ENDSSH

      - name: Smoke test (vérification HTTPS)
        run: |
          sleep 3
          curl --fail --silent --max-time 10 \
            https://${{ secrets.MCP_PUBLIC_HOSTNAME }}/.well-known/oauth-protected-resource \
            | jq '.resource'
