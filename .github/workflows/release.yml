name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish to npm & MCP Registry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PACKAGE_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Build MCPB bundle
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          npx @anthropic-ai/mcpb pack . "boondmanager-mcp-server-v${TAG_VERSION}.mcpb"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section between "## [<version>]" and the next "## [" header.
          # We use index() rather than regex to avoid escaping the [] of the section header.
          awk -v needle="## [${TAG_VERSION}]" '
            index($0, needle) == 1 { capture = 1; next }
            capture && index($0, "## [") == 1 { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "WARNING: no CHANGELOG section found for $TAG_VERSION — release will use auto-generated notes only"
          else
            echo "Release notes for v$TAG_VERSION:"
            cat RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: "*.mcpb"

      - name: Update server.json for MCP Registry
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MCPB_FILE="boondmanager-mcp-server-v${TAG_VERSION}.mcpb"
          MCPB_SHA256=$(sha256sum "$MCPB_FILE" | awk '{print $1}')
          MCPB_URL="https://github.com/fauguste/boondmanager-mcp-server/releases/download/v${TAG_VERSION}/${MCPB_FILE}"

          jq \
            --arg ver "$TAG_VERSION" \
            --arg url "$MCPB_URL" \
            --arg sha "$MCPB_SHA256" \
            '.version = $ver
             | .packages[0].version = $ver
             | .packages[1].identifier = $url
             | .packages[1].fileSha256 = $sha' \
            server.json > server.json.tmp && mv server.json.tmp server.json

          echo "Updated server.json:"
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
